<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Collection Manager</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1>🎬 Movie Collection Manager</h1>

      <form>
        <div class="form-grid">
          <div>
            <label>Movie Title</label>
            <input type="text" id="title" placeholder="Enter movie title" />
          </div>

          <div>
            <label>Director</label>
            <input
              type="text"
              id="director"
              required
              placeholder="Director name"
            />
          </div>

          <div>
            <label>Genre</label>

            <select id="genre">
              <option value="">Select Genre</option>

              <option>Action</option>
              <option>Adventure</option>
              <option>Comedy</option>
              <option>Drama</option>
              <option>Fantasy</option>
              <option>Horror</option>
              <option>Romance</option>
              <option>Sci-Fi</option>
              <option>Thriller</option>
            </select>
          </div>

          <div>
            <label>Release Year</label>

            <input type="number" id="year" required placeholder="2024" />
          </div>

          <div>
            <label>Rating</label>

            <input
              type="number"
              id="rating"
              min="1"
              max="10"
              placeholder="1 - 10"
              required
            />
          </div>

          <div>
            <label>Status</label>

            <select id="status">
              <option value="">Choose Status</option>
              <option value="watched">Watched</option>
              <option value="watching">Watching</option>
              <option value="wishlist">Wishlist</option>
            </select>
          </div>
        </div>

        <button id="submitBtn">Add Movie</button>
      </form>

      <hr />

      <div class="controls">
        <input type="text" id="search" placeholder="Search title, director or genre" />
        
        <select id="filter">
          <option value="all">All Movies</option>
          <option value="watched">Watched</option>
          <option value="watching">Watching</option>
          <option value="wishlist">Wishlist</option>
          <option value="favorite">Favorites</option>
        </select>

        <select id="sort">
          <option value="">Sort By</option>
          <option value="az">Title A-Z</option>
          <option value="za">Title Z-A</option>
          <option value="high">Highest Rating</option>
          <option value="low">Lowest Rating</option>
          <option value="new">Newest Year</option>
          <option value="old">Oldest Year</option>
        </select>
      </div>

      <div class="stats">
        <div class="card">
          <h3>Total Movies</h3>
          <p id="totalMovies">0</p>
        </div>

        <div class="card">
          <h3>Watched</h3>
          <p id="watchedMovies">0</p>
        </div>

        <div class="card">
          <h3>Watching</h3>

          <p id="watchingMovies">0</p>
        </div>

        <div class="card">
          <h3>Wishlist</h3>
          <p id="wishlistMovies">0</p>
        </div>

        <div class="card">
          <h3>Favorites ⭐</h3>
          <p id="favoriteMovies">0</p>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Director</th>
            <th>Genre</th>
            <th>Year</th>
            <th>Rating</th>
            <th>Status</th>
            <th>Favorite</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Interstellar</td>
            <td>Christopher Nolan</td>
            <td>Sci-Fi</td>
            <td>2014</td>
            <td>9</td>

            <td>
              <button class="status-btn" data-id="1">Watched</button>
            </td>

            <td>
              <button class="favorite-btn" data-id="1">⭐</button>
            </td>

            <td class="actions">
              <button class="edit-btn" data-id="1">Edit</button>

              <button class="delete-btn" data-id="1">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
