<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory & Sales Management</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>📦 Inventory & Sales Management</h1>

      <form>
        <div class="form-grid">
          <div>
            <label>Product Name</label>
            <input
              type="text"
              id="productName"
              placeholder="Enter product name"
            />
          </div>

          <div>
            <label>Category</label>

            <select id="category">
              <option value="">Select Category</option>
              <option>Electronics</option>
              <option>Clothing</option>
              <option>Books</option>
              <option>Sports</option>
              <option>Home</option>
              <option>Beauty</option>
              <option>Food</option>
            </select>
          </div>

          <div>
            <label>Supplier</label>

            <input type="text" id="supplier" placeholder="Supplier Name" />
          </div>

          <div>
            <label>Price ($)</label>

            <input type="number" id="price" placeholder="100" />
          </div>

          <div>
            <label>Stock Quantity</label>

            <input type="number" id="stock" placeholder="50" />
          </div>
        </div>

        <button id="submitBtn">Add Product</button>
      </form>

      <hr />

      <div class="controls">
        <input
          type="text"
          id="search"
          placeholder="Search product, category or supplier"
        />

        <select id="filter">
          <option value="all">All Products</option>
          <option value="instock">In Stock</option>
          <option value="lowstock">Low Stock</option>
          <option value="outofstock">Out of Stock</option>
        </select>

        <select id="sort">
          <option value="">Sort By</option>
          <option value="az">Product A-Z</option>
          <option value="za">Product Z-A</option>
          <option value="highprice">Highest Price</option>
          <option value="lowprice">Lowest Price</option>
          <option value="highstock">Highest Stock</option>
          <option value="lowstock">Lowest Stock</option>
        </select>
      </div>

      <div class="stats">
        <div class="card">
          <h3>Total Products</h3>
          <p id="totalProducts">0</p>
        </div>

        <div class="card">
          <h3>In Stock</h3>
          <p id="inStock">0</p>
        </div>

        <div class="card">
          <h3>Low Stock</h3>
          <p id="lowStock">0</p>
        </div>

        <div class="card">
          <h3>Out of Stock</h3>
          <p id="outOfStock">0</p>
        </div>

        <div class="card">
          <h3>Inventory Value</h3>
          <p id="inventoryValue">$0</p>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Product</th>
            <th>Category</th>
            <th>Supplier</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <!-- JavaScript will render rows here -->
          <tr>
            <td>Laptop</td>
            <td>Electronics</td>
            <td>HP Store</td>
            <td>$1200</td>
            <td>18</td>
            <td>
              <span class="status in-stock"> In Stock </span>
            </td>

            <td>
              <button class="sell-btn" data-id="1">Sell</button>
              <button class="restock-btn" data-id="1">+10 Stock</button>
              <button class="edit-btn" data-id="1">Edit</button>
              <button class="delete-btn" data-id="1">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
